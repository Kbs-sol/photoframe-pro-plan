name: agent-full-report

on:
  workflow_dispatch:
  schedule:
    # Optional: uncomment to auto-run every Friday 18:00 IST (12:30 UTC)
    # - cron: "30 12 * * 5"

permissions:
  contents: read

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --cwd .agent/scripts || true
      - name: Fetch everything (30 days)
        env:
          SOURCES: "gsc,ga4,razorpay,supabase,cloudinary,competitors,pr-feedback"
          DAYS: "30"
          RAW: "true"
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p out
          bun .agent/scripts/package-report.ts
      - uses: actions/upload-artifact@v4
        with:
          name: weekly-brief-${{ github.run_id }}
          path: out/
          retention-days: 90

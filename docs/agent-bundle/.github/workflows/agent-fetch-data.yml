name: agent-fetch-data

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma list: gsc,ga4,razorpay,supabase,cloudinary,competitors,pr-feedback"
        required: false
        default: "gsc,ga4,razorpay,supabase,pr-feedback"
      days:
        description: "Lookback window in days"
        required: false
        default: "7"
      raw:
        description: "Include raw API responses (true/false)"
        required: false
        default: "false"
      focus_filter:
        description: "Optional URL-path substring filter (e.g. /product/cricket-)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --cwd .agent/scripts || true

      - name: Fetch data
        env:
          SOURCES: ${{ github.event.inputs.sources }}
          DAYS: ${{ github.event.inputs.days }}
          RAW: ${{ github.event.inputs.raw }}
          FOCUS_FILTER: ${{ github.event.inputs.focus_filter }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p out
          bun .agent/scripts/package-report.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-report-${{ github.run_id }}
          path: out/
          retention-days: 30

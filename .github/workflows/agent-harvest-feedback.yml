name: agent-harvest-feedback

# Standalone: harvest @agent mentions from recent PR comments.
# Also invoked as part of agent-fetch-data.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Harvest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun .agent/scripts/harvest-feedback.ts
      - name: Commit updated inbox
        run: |
          git config user.name "chitraframe-agent[bot]"
          git config user.email "agent@chitraframe.local"
          git add .agent/feedback-inbox.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "agent: refresh feedback-inbox"
          git push origin HEAD:main